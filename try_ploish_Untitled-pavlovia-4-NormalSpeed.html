        const target = jsPsych.timelineVariable('target');
        if (target && typeof target === 'string') {
          return `<div class="small-info">List ${selected_list_number}</div><div class="stimulus">${target}</div><p>W = real word, O = nonword</p>`;
        }
        return target;
      },
      choices: ['w', 'o'],
      trial_duration: 3000,
      data: function() {
        return {
          item_id: jsPsych.timelineVariable('id'),
          prime: jsPsych.timelineVariable('prime'),
          target: jsPsych.timelineVariable('target'),
          condition: jsPsych.timelineVariable('condition'),
          list: jsPsych.timelineVariable('list'),
          item_type: jsPsych.timelineVariable('item_type'),
          phase: 'target',
          correct_response: jsPsych.timelineVariable('item_type') === 'nonword' ? 'o' : 'w'
        };
      },
      on_finish: function(data) {
        const timed_out = data.response === null;
        data.timed_out = timed_out;
        data.correct = !timed_out && jsPsych.pluginAPI.compareKeys(data.response, data.correct_response);
        data.result = data.correct ? 'right' : 'wrong';
      }
    };

    const trial_procedure = {
      timeline: [fixation, prime_trial, blank, target_trial],
      timeline_variables: randomized_trials
    };

    timeline.push(trial_procedure);

    const end_screen = {
      type: jsPsychHtmlKeyboardResponse,
      stimulus: `
        <p>You have completed the experiment!</p>
        <p>Thank you very much for participating!</p>
        <p>This experiment is part of a study on language processing.</p>
        <p>That we have to do for a course.</p>
        <p>But, if all goes well, we would like to share the general conclusions when we are done!</p>
        <p>Press any key to finish!</p>
      `
    };
    timeline.push(end_screen);

    const pavlovia_finish = {
      type: jsPsychPavlovia,
      command: "finish"
    };
    timeline.push(pavlovia_finish);

    jsPsych.run(timeline);
  </script>
  </body>
