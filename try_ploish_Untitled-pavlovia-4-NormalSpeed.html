<html>
  <head>
    <meta charset="UTF-8" />
    <title>Eksperyment-Experiment-Utrecht</title>

    <link href="https://unpkg.com/jspsych@8.2.3/css/jspsych.css" rel="stylesheet" />

    <style>
      .stimulus {
        font-size: 80px !important;
        text-align: center;
      }
      .small-info {
        position: absolute;
        top: 10px;
        right: 15px;

      }
    </style>
  </head>

  <body>
  <script>
    const jsPsych = initJsPsych();

    const urlParams = new URLSearchParams(window.location.search);
    const participant_id =
      urlParams.get('PROLIFIC_PID') ||
      urlParams.get('participant') ||
      urlParams.get('id') ||
      jsPsych.randomization.randomID(10);

    jsPsych.data.addProperties({
      participant_id: participant_id

    const timeline = [];

    const pavlovia_init = {
      type: jsPsychPavlovia,
      command: "init"
    };
    timeline.push(pavlovia_init);

    const list1 = [
      { id: 1, target: "koty", prime: "biali", condition: 1, condition_name: "plus number", list: 1, item_type: "real" },

const list2 = [

const fillers = [

  { id: 2, target: "okny", prime: "brązowo", condition: 0, list: "filler" },

  { id: 4, target: "noche", prime: "chudo", condition: 0, list: "filler" },
  { id: 5, target: "ptany", prime: "ciekawo", condition: 0, list: "filler" },
  { id: 6, target: "udeli", prime: "ciemno", condition: 0, list: "filler" },
  { id: 7, target: "zasiny", prime: "miękko", condition: 0, list: "filler" },
  { id: 8, target: "słoncie", prime: "czerwono", condition: 0, list: "filler" },
  { id: 9, target: "gwazdy", prime: "drewniano", condition: 0, list: "filler" },
  { id: 10, target: "łafpy", prime: "dużo", condition: 0, list: "filler" },
  { id: 11, target: "gófy", prime: "głupawo", condition: 0, list: "filler" },
  { id: 12, target: "lafy", prime: "jasno", condition: 0, list: "filler" },
  { id: 13, target: "mefle", prime: "lekko", condition: 0, list: "filler" },
  { id: 14, target: "łageli", prime: "ładnie", condition: 0, list: "filler" },
  { id: 15, target: "pafmy", prime: "łagodnie", condition: 0, list: "filler" },
  { id: 16, target: "folety", prime: "mało", condition: 0, list: "filler" },
  { id: 17, target: "miasy", prime: "miło", condition: 0, list: "filler" },
  { id: 18, target: "ksiąfki", prime: "niemiło", condition: 0, list: "filler" },
  { id: 19, target: "kurfki", prime: "niesławnie", condition: 0, list: "filler" },
  { id: 20, target: "wyriny", prime: "niewinnie", condition: 0, list: "filler" },
  { id: 21, target: "czereni", prime: "nowo", condition: 0, list: "filler" },
  { id: 22, target: "owiny", prime: "zdrowo", condition: 0, list: "filler" },
  { id: 23, target: "skawby", prime: "pięknie", condition: 0, list: "filler" },
  { id: 24, target: "puszny", prime: "pluszowo", condition: 0, list: "filler" },
  { id: 25, target: "krzely", prime: "żółto", condition: 0, list: "filler" },
  { id: 26, target: "lify", prime: "wolno", condition: 0, list: "filler" },
  { id: 27, target: "blany", prime: "zimno", condition: 0, list: "filler" },
  { id: 28, target: "biliny", prime: "wesoło", condition: 0, list: "filler" },
  { id: 29, target: "zeginy", prime: "smutno", condition: 0, list: "filler" },
  { id: 30, target: "kraly", prime: "twardo", condition: 0, list: "filler",  item_type: "nonword" }
];


    /* Choose between lists in the experiment */
    const all_lists = [list1, list2];
    const selected_list = jsPsych.randomization.sampleWithoutReplacement(all_lists, 1)[0];
    const selected_list_number = selected_list[0].list;
    const selected_trials = selected_list.map(function(item) {
      return { ...item, item_type: 'real', condition_name: item.condition_name || '' };
    });
    const filler_trials = fillers.map(function(item) {
      return { ...item, item_type: 'nonword', condition_name: item.condition_name || '' };
    });
    const randomized_trials = jsPsych.randomization.shuffle(selected_trials.concat(filler_trials));

    const welcome = {
      type: jsPsychHtmlKeyboardResponse,
      stimulus: `
        <div class="small-info">List ${selected_list_number}</div>
        <p><strong>Cześć!</strong></p>
        <p>Dziękujemy, że zechciałeś/aś wziąć udział w naszym eksperymencie!</p>
        <p><strong>Instrukcje:</strong></p>
        <p>Na ekranie zostanie pokazany ci ciąg liter, później czarny krzyżyk (fiksacja) i na koniec kolejny ciąg liter. Później zobaczysz biały ekran i sekwencja się powtórzy.</p>
        <p>Twoim zadaniem będzie zdecydować, czy ciąg liter pokazany zaraz po czarnym krzyżyku jest prawdziwym słowem czy nie (ciąg liter bez znaczenia). Odpowiedz jak najszybciej</p>
        <p>Jeśli chcesz możesz podać odpowiedź dla każdego widzianego (nie)słowa.</p>
        <p>Naciśnij P dla prawdziwych słów i Q dla nieprawdziwych słów.</p>
        <p>Naciśnij P lub Q by kontynuować.</p>
      `
    };
    timeline.push(welcome);

    const consent_screen = {
      type: jsPsychHtmlKeyboardResponse,
      stimulus: `
        <div class="small-info">List ${selected_list_number}</div>
        <p><strong>Zanim zaczniemy, proszę przeczytaj poniższe:</strong></p>
        <p><strong>Uwaga!</strong></p>
        <p>Uczestnicząc w tym badaniu, oświadczasz, że masz ukończone co najmniej 18 lat, zapoznałeś się z przedstawionymi informacjami i wyrażasz dobrowolną zgodę na udział.</p>
        <p>Jeśli nie masz 18 lat lub nie chcesz brać udziału w badniu, proszę opuść badanie</p>
        <p>Jeśli masz 18 lat i zgadzasz się na uział, możesz kontynuować</p>
        <p>Naciśnij spację by kontynuować.</p>
      `
    };
    timeline.push(consent_screen);

    const fixation = {
      type: jsPsychHtmlKeyboardResponse,
      stimulus: `
        <div class="small-info">List ${selected_list_number}</div>
        <div class="stimulus">+</div>
      `,
      choices: "NO_KEYS",
      trial_duration: 2000
    };

    const prime_trial = {
      type: jsPsychHtmlKeyboardResponse,
      stimulus: function() {
        const prime = jsPsych.timelineVariable('prime');
        if (prime && typeof prime === 'string') {
          return `<div class="small-info">List ${selected_list_number}</div><div class="stimulus" style="font-size: 80px;">${prime}</div>`;
        }
        return prime;
      },
      choices: "NO_KEYS",
      trial_duration: 2000,
      data: function() {
        return {
          item_id: jsPsych.timelineVariable('id'),
          prime: jsPsych.timelineVariable('prime'),
          target: jsPsych.timelineVariable('target'),
          condition: jsPsych.timelineVariable('condition'),
          condition_name: jsPsych.timelineVariable('condition_name') || '',
          list: jsPsych.timelineVariable('list'),
          phase: 'prime'
        };
      }
    };

    const blank = {
      type: jsPsychHtmlKeyboardResponse,
      stimulus: '',
      choices: "NO_KEYS",
      trial_duration: 100
    };

    const post_target_blank = {
      type: jsPsychHtmlKeyboardResponse,
      stimulus: '',
      choices: "NO_KEYS",
      trial_duration: 1500
    };

    const practice_intro = {
      type: jsPsychHtmlKeyboardResponse,
      stimulus: `
        <div class="small-info">Practice</div>
        <p>Zaczniemy od kilku rund próbnych.</p>
        <p>Zobaczysz ciąg liter, później kolejny. Zdecyduj, czy dany ciąg liter jest słówkiem lub nie.</p>
        <p>Naciśnij P dla prawdziwych słów i Q dla nieprawdziwych.</p>
        <p>Naciśnij spację by kontynuować.</p>
      `
    };

    const practice_prime_trial = {
      type: jsPsychHtmlKeyboardResponse,
      stimulus: `
        <div class="small-info">Practice</div>
        <div class="stimulus">wziąć</div>
      `,
      choices: "NO_KEYS",
      trial_duration: 2000,
      data: {
        phase: 'practice_prime',
        practice: true,
        prime: 'wziąć',
        target: 'kurtka'
      }
    };

    const practice_target_trial = {
      type: jsPsychHtmlKeyboardResponse,
      stimulus: `
        <div class="small-info">Practice</div>
        <div class="stimulus">kurtka</div>
        <p>P = prawdzie słowo, Q = nieprawdziwe słowo</p>
      `,
      choices: ['p', 'q'],
      data: {
        phase: 'practice_target',
        practice: true,
        prime: 'wziąć',
        target: 'kurtka',
        item_type: 'real',
        correct_response: 'p'
      },
      on_finish: function(data) {
        data.correct = jsPsych.pluginAPI.compareKeys(data.response, data.correct_response);
        data.result = data.correct ? 'Dobrze' : 'Źle';
      }
    };

    const practice_feedback = {
      type: jsPsychHtmlKeyboardResponse,
      stimulus: function() {
        const last_trial = jsPsych.data.get().last(1).values()[0];
        return `
          <div class="small-info">Practice</div>
          <p>${last_trial.correct ? 'Świetnie!' : 'Niepoprawnie'}</p>
          <p>Naciśnij spację by kontynuować.</p>
        `;
      }
    };

    const practice_prime_trial_nonword = {
      type: jsPsychHtmlKeyboardResponse,
      stimulus: `
        <div class="small-info">Practice</div>
        <div class="stimulus">pojechać</div>
      `,
      choices: "NO_KEYS",
      trial_duration: 2000,
      data: {
        phase: 'practice_prime',
        practice: true,
        prime: 'pojechać',
        target: 'blubladi'
      }
    };

    const practice_target_trial_nonword = {
      type: jsPsychHtmlKeyboardResponse,
      stimulus: `
        <div class="small-info">Practice</div>
        <div class="stimulus">blubladi</div>
        <p>P = prawdzie słowo, Q = nieprawdziwe słowo</p>
      `,
      choices: ['p', 'q'],
      data: {
        phase: 'practice_target',
        practice: true,
        prime: 'pojechać',
        target: 'blubladi',
        item_type: 'nonword',
        correct_response: 'q'
      },
      on_finish: function(data) {
        data.correct = jsPsych.pluginAPI.compareKeys(data.response, data.correct_response);
        data.result = data.correct ? 'Dobrze' : 'Źle';
      }
    };

        const practice_prime_trial_real2 = {
      type: jsPsychHtmlKeyboardResponse,
      stimulus: `
        <div class="small-info">Practice</div>
        <div class="stimulus">kierować</div>

        target: 'wioska'

        data.result = data.correct ? 'Dobrze' : 'Źle';
      }

    const practice_prime_trial_nonword2 = {

        <div class="small-info">Practice</div>
        <div class="stimulus">biegać</div>
      `,
      choices: "NO_KEYS",
      trial_duration: 2000,
      data: {
        phase: 'practice_prime',
        practice: true,
        prime: 'biegać',
        target: 'trudaki'
      }
    };

    const practice_target_trial_nonword2 = {
      type: jsPsychHtmlKeyboardResponse,
      stimulus: `
        <div class="small-info">Practice</div>
        <div class="stimulus">trudaki</div>
        <p>P = prawdzie słowo, Q = nieprawdziwe słowo</p>
      `,
      choices: ['p', 'q'],

        data.correct = jsPsych.pluginAPI.compareKeys(data.response, data.correct_response);

      }

    const practice_procedure = {
      timeline: [
        practice_intro,
        blank,
        practice_prime_trial,
        fixation,
        practice_target_trial,
        practice_feedback,
        blank,
        practice_prime_trial_nonword,
        fixation,
        practice_target_trial_nonword,
        practice_feedback,

        practice_target_trial_real2,
        practice_feedback,

        practice_prime_trial_nonword2,
        fixation,
        practice_target_trial_nonword2,

    const previous_experience = {
      type: jsPsychHtmlKeyboardResponse,
      stimulus: `
        <div class="small-info">List ${selected_list_number}</div>
        <p><strong>Jendak zanim zaczniemy</strong></p>
        <p>Czy już wykonałeś to badanie?</p>
        <p>Naciśnij <strong>1</strong> jeśli wykonujesz go po raz pierwszy</p>
        <p>Naciśnij <strong>2</strong> jeśli jest to twój drugi lub kolejny raz</p>
      `,
      choices: ['1', '2'],
      data: {
        phase: 'previous_experience'
      },
      on_finish: function(data) {
        data.first_time = data.response === '1' ? true : false;
      }
    };

    const handedness_question = {
      type: jsPsychHtmlKeyboardResponse,
      stimulus: `
        <div class="small-info">List ${selected_list_number}</div>
        <p><strong>Prawo-/leworęczność</strong></p>
        <p><strong>Tak, to bardzo ważne. Zanim zaczniemy</strong></p>
        <p>Jesteś praworęczny czy leworęczny?</p>
        <p>Naciśnij <strong>Q</strong> jeśli jesteś leworęczny</p>
        <p>Naciśnij <strong>P</strong> jeśli jesteś praworęczny</p>
      `,
      choices: ['q', 'p'],
      data: {
        phase: 'handedness' 
      },
      on_finish: function(data) {
        data.handedness = data.response === 'q' ? 'left' : 'right';
      }
    };

    const age_question = {
      type: jsPsychSurveyHtmlForm,
      html: `
        <div class="small-info">List ${selected_list_number}</div>
        <p><strong>Podaj swój wiek</strong></p>
        <p>
          <input 
            name="age" 
            type="number" 
            min="18" 
            max="100" 
            required
            style="font-size:22px; padding:10px; width:100px;"
          >
        </p>
      `,
      button_label: 'Dalej',
      on_finish: function(data) {
        const responses = JSON.parse(data.responses);
        data.age = responses.age;
        jsPsych.data.addProperties({
          age: responses.age
        });
      }
    };

    timeline.push(previous_experience);
    timeline.push(handedness_question);
    timeline.push(age_question);
    timeline.push(practice_procedure);

    const target_trial = {
      type: jsPsychHtmlKeyboardResponse,
      stimulus: function() {
        const target = jsPsych.timelineVariable('target');
        if (target && typeof target === 'string') {
          return `<div class="small-info">List ${selected_list_number}</div><div class="stimulus" style="font-size: 80px;">${target}</div><p>P = prawdziwe słowo, Q = nieprawdziwe słowo</p>`;
        }
        return target;
      },
      choices: ['p', 'q'],
      trial_duration: 3000,
      data: function() {
        return {
          item_id: jsPsych.timelineVariable('id'),
          prime: jsPsych.timelineVariable('prime'),
          target: jsPsych.timelineVariable('target'),
          condition: jsPsych.timelineVariable('condition'),
          condition_name: jsPsych.timelineVariable('condition_name') || '',
          list: jsPsych.timelineVariable('list'),
          item_type: jsPsych.timelineVariable('item_type'),
          phase: 'target',
          correct_response: jsPsych.timelineVariable('item_type') === 'nonword' ? 'q' : 'p'
        };
      },
      on_finish: function(data) {
        const timed_out = data.response === null;
        data.timed_out = timed_out;
        data.correct = !timed_out && jsPsych.pluginAPI.compareKeys(data.response, data.correct_response);
        data.result = data.correct ? 'Dobrze' : 'Źle';
      }
    };

    const trial_procedure = {
      timeline: [prime_trial, fixation, target_trial, post_target_blank],
      timeline_variables: randomized_trials
    };

    timeline.push(trial_procedure);

    const end_screen = {
      type: jsPsychHtmlKeyboardResponse,
      stimulus: `
        <p>Zakończyłeś eksperyment</p>
        <p>Dziękujemy za udział!</p>
        <p>Eksperyment jest częścią badania skupiającego się na tzw. primingu. Badamy, jak jedno słówko wpływa na przetwarzanie kolejnego.</p>
        <p>Badanie jest naszym projektem zaliczeniowym i jesteśmy wdzięczni za twoją pomoc.</p>
        <p>Naciśnij spację by zakończyć!</p>
      `
    };
    timeline.push(end_screen);

    const pavlovia_finish = {
      type: jsPsychPavlovia,
      command: "finish"
    };
    timeline.push(pavlovia_finish);

    jsPsych.run(timeline);
  </script>
  </body>
</html>
