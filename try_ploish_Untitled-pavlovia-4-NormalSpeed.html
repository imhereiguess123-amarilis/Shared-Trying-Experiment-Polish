<!DOCTYPE html>
<html>
  <head>
    <meta charset="UTF-8" />
    <title>Priming Experiment - Lists 1, 2</title>

    <script src="https://unpkg.com/jspsych@8.2.3"></script>
    <script src="https://unpkg.com/@jspsych/plugin-html-keyboard-response@2.1.0"></script>
    <link href="https://unpkg.com/jspsych@8.2.3/css/jspsych.css" rel="stylesheet" />
    <script type="text/javascript" src="https://pavlovia.org/lib/jspsych-7-pavlovia-2022.1.1.js"></script>

    <style>
      .stimulus {
        font-size: 42px;
        text-align: center;
      }
      .small-info {
        position: absolute;
        top: 10px;
        right: 15px;
        font-size: 16px;
        color: #666;
      }
    </style>
  </head>

  <body>
  <script>
    const jsPsych = initJsPsych();

    const timeline = [];

    const pavlovia_init = {
      type: jsPsychPavlovia,
      command: "init"
    };
    timeline.push(pavlovia_init);

    const list1 = [
      { id: 1, target: "koty", prime: "biali", condition: 1, list: 1, item_type: "real" },
      { id: 2, target: "krzewy", prime: "brazowa", condition: 2, list: 1, item_type: "real" },
      { id: 3, target: "listy", prime: "brudni", condition: 1, list: 1, item_type: "real" },
      { id: 4, target: "blaty", prime: "chuda", condition: 2, list: 1, item_type: "real" },
      { id: 5, target: "rowery", prime: "ciekawi", condition: 1, list: 1, item_type: "real" },
      { id: 6, target: "zegary", prime: "ciemna", condition: 2, list: 1, item_type: "real" },
      { id: 7, target: "krany", prime: "ciepli", condition: 1, list: 1, item_type: "real" },
      { id: 8, target: "domy", prime: "czerwona", condition: 2, list: 1, item_type: "real" },
      { id: 9, target: "krawaty", prime: "drewniani", condition: 1, list: 1, item_type: "real" },
      { id: 10, target: "dachy", prime: "duża", condition: 2, list: 1, item_type: "real" },
      { id: 11, target: "zasłony", prime: "głupawi", condition: 1, list: 1, item_type: "real" },
      { id: 12, target: "namioty", prime: "jasna", condition: 2, list: 1, item_type: "real" },
      { id: 13, target: "duchy", prime: "lekki", condition: 1, list: 1, item_type: "real" },
      { id: 14, target: "obrusy", prime: "ładna", condition: 2, list: 1, item_type: "real" },
      { id: 15, target: "płoty", prime: "łagodni", condition: 1, list: 1, item_type: "real" },
      { id: 16, target: "pasy", prime: "mata", condition: 2, list: 1, item_type: "real" },
      { id: 17, target: "wyrazy", prime: "mili", condition: 1, list: 1, item_type: "real" },
      { id: 18, target: "ekrany", prime: "niemita", condition: 2, list: 1, item_type: "real" },
      { id: 19, target: "tygrysy", prime: "niestawni", condition: 1, list: 1, item_type: "real" },
      { id: 20, target: "swetry", prime: "niewinna", condition: 2, list: 1, item_type: "real" },
      { id: 21, target: "wagony", prime: "nowi", condition: 1, list: 1, item_type: "real" },
      { id: 22, target: "dywany", prime: "nudna", condition: 2, list: 1, item_type: "real" },
      { id: 23, target: "tory", prime: "piękni", condition: 1, list: 1, item_type: "real" },
      { id: 24, target: "bilety", prime: "pisana", condition: 2, list: 1, item_type: "real" },
      { id: 25, target: "piloty", prime: "pluszowi", condition: 1, list: 1, item_type: "real" },
      { id: 26, target: "kotlety", prime: "podwójna", condition: 2, list: 1, item_type: "real" },
      { id: 27, target: "stoły", prime: "poważni", condition: 1, list: 1, item_type: "real" },
      { id: 28, target: "delfiny", prime: "przysioja", condition: 2, list: 1, item_type: "real" },
      { id: 29, target: "laptopy", prime: "stawni", condition: 1, list: 1, item_type: "real" },
      { id: 30, target: "podpisy", prime: "smutna", condition: 2, list: 1, item_type: "real" }
    ];
 
const list2 = [
  { id: 1, target: "koty", prime: "biała", condition: 2, list: 2, item_type: "real" },
  { id: 2, target: "krzewy", prime: "brązowi", condition: 1, list: 2 },
  { id: 3, target: "listy", prime: "brudna", condition: 2, list: 2 },
  { id: 4, target: "blaty", prime: "chudzi", condition: 1, list: 2 },
  { id: 5, target: "rowery", prime: "ciekawa", condition: 2, list: 2 },
  { id: 6, target: "zegary", prime: "ciemni", condition: 1, list: 2 },
  { id: 7, target: "krany", prime: "ciepła", condition: 2, list: 2 },
  { id: 8, target: "domy", prime: "czerwoni", condition: 1, list: 2 },
  { id: 9, target: "krawaty", prime: "drewniana", condition: 2, list: 2 },
  { id: 10, target: "dachy", prime: "duzi", condition: 1, list: 2 },
  { id: 11, target: "zasłony", prime: "głupawa", condition: 2, list: 2 },
  { id: 12, target: "namioty", prime: "jaśni", condition: 1, list: 2 },
  { id: 13, target: "duchy", prime: "lekka", condition: 2, list: 2 },
  { id: 14, target: "obrusy", prime: "ładni", condition: 1, list: 2 },
  { id: 15, target: "płoty", prime: "łagodna", condition: 2, list: 2 },
  { id: 16, target: "pasy", prime: "mali", condition: 1, list: 2 },
  { id: 17, target: "wyrazy", prime: "miła", condition: 2, list: 2 },
  { id: 18, target: "ekrany", prime: "niemili", condition: 1, list: 2 },
  { id: 19, target: "tygrysy", prime: "niesławna", condition: 2, list: 2 },
  { id: 20, target: "swetry", prime: "niewinni", condition: 1, list: 2 },
  { id: 21, target: "wagony", prime: "nowa", condition: 2, list: 2 },
  { id: 22, target: "dywany", prime: "nudni", condition: 1, list: 2 },
  { id: 23, target: "tory", prime: "piękna", condition: 2, list: 2 },
  { id: 24, target: "bilety", prime: "pisani", condition: 1, list: 2 },
  { id: 25, target: "piloty", prime: "pluszowa", condition: 2, list: 2 },
  { id: 26, target: "kotlety", prime: "podwójni", condition: 1, list: 2 },
  { id: 27, target: "stoły", prime: "poważna", condition: 2, list: 2 },
  { id: 28, target: "delfiny", prime: "przystojni", condition: 1, list: 2 },
  { id: 29, target: "laptopy", prime: "sławna", condition: 2, list: 2 },
  { id: 30, target: "podpisy", prime: "smutni", condition: 1, list: 2, item_type: "real" }
];    

const fillers = [
  { id: 1, target: "myfy", prime: "biało", condition: 0, list: "filler", item_type: "nonword" },
  { id: 2, target: "okny", prime: "brązowo", condition: 0, list: "filler" },
  { id: 3, target: "kufki", prime: "brudno", condition: 0, list: "filler" },
  { id: 4, target: "noche", prime: "chudo", condition: 0, list: "filler" },
  { id: 5, target: "ptany", prime: "ciekawo", condition: 0, list: "filler" },
  { id: 6, target: "udeli", prime: "ciemno", condition: 0, list: "filler" },
  { id: 7, target: "zasiny", prime: "miękko", condition: 0, list: "filler" },
  { id: 8, target: "słoncie", prime: "czerwono", condition: 0, list: "filler" },
  { id: 9, target: "gwazdy", prime: "drewniano", condition: 0, list: "filler" },
  { id: 10, target: "łafpy", prime: "dużo", condition: 0, list: "filler" },
  { id: 11, target: "gófy", prime: "głupawo", condition: 0, list: "filler" },
  { id: 12, target: "lafy", prime: "jasno", condition: 0, list: "filler" },
  { id: 13, target: "mefle", prime: "lekko", condition: 0, list: "filler" },
  { id: 14, target: "łageli", prime: "ładnie", condition: 0, list: "filler" },
  { id: 15, target: "pafmy", prime: "łagodnie", condition: 0, list: "filler" },
  { id: 16, target: "folety", prime: "mało", condition: 0, list: "filler" },
  { id: 17, target: "miasy", prime: "miło", condition: 0, list: "filler" },
  { id: 18, target: "ksiąfki", prime: "niemiło", condition: 0, list: "filler" },
  { id: 19, target: "kurfki", prime: "niesławnie", condition: 0, list: "filler" },
  { id: 20, target: "wyriny", prime: "niewinnie", condition: 0, list: "filler" },
  { id: 21, target: "czereni", prime: "nowo", condition: 0, list: "filler" },
  { id: 22, target: "owiny", prime: "zdrowo", condition: 0, list: "filler" },
  { id: 23, target: "skawby", prime: "pięknie", condition: 0, list: "filler" },
  { id: 24, target: "puszny", prime: "pluszowo", condition: 0, list: "filler" },
  { id: 25, target: "krzely", prime: "żółto", condition: 0, list: "filler" },
  { id: 26, target: "lify", prime: "wolno", condition: 0, list: "filler" },
  { id: 27, target: "blany", prime: "zimno", condition: 0, list: "filler" },
  { id: 28, target: "biliny", prime: "wesoło", condition: 0, list: "filler" },
  { id: 29, target: "zeginy", prime: "smutno", condition: 0, list: "filler" },
  { id: 30, target: "kraly", prime: "twardo", condition: 0, list: "filler",  item_type: "nonword" }
];


    /* Choose between lists in the experiment */
    const all_lists = [list1, list2];
    const selected_list = jsPsych.randomization.sampleWithoutReplacement(all_lists, 1)[0];
    const selected_list_number = selected_list[0].list;
    const selected_trials = selected_list.map(function(item) {
      return { ...item, item_type: 'real' };
    });
    const filler_trials = fillers.map(function(item) {
      return { ...item, item_type: 'nonword' };
    });
    const randomized_trials = jsPsych.randomization.shuffle(selected_trials.concat(filler_trials));

    const welcome = {
      type: jsPsychHtmlKeyboardResponse,
      stimulus: `
        <div class="small-info">List ${selected_list_number}</div>
        <p><strong>Cześć!</strong></p>
        <p>Dziękujemy, że zechciałeś/aś wziąć udział w naszym eksperymencie!</p>
        <p><strong>Instrukcje:</strong></p>
        <p>Na ekranie zostanie pokazany ci ciąg liter, później biały ekran (przerwa) i na koniec kolejny ciąg liter.</p>
        <p>Twoim zadaniem będzie zdecydować, czy dany ciąg liter jest prawdziwym słowem czy nie (ciąg liter bez znaczenia).</p>
        <p>Naciśnij P dla prawdziwych słów i Q dla nieprawdziwych słów.</p>
        <p>Naciśnij P lub Q by kontynuować.</p>
      `
    };
    timeline.push(welcome);

    const consent_screen = {
      type: jsPsychHtmlKeyboardResponse,
      stimulus: `
        <div class="small-info">List ${selected_list_number}</div>
        <p><strong>Zanim zaczniemy, proszę przeczytaj poniższe:</strong></p>
        <p><strong>Uwaga!</strong></p>
        <p>Uczestnicząc w tym badaniu, oświadczasz, że masz ukończone co najmniej 18 lat, zapoznałeś się z przedstawionymi informacjami i wyrażasz dobrowolną zgodę na udział.</p>
        <p>Jeśli nie masz 18 lat lub nie chcesz brać udziału w badniu, proszę opuść badanie</p>
        <p>Jeśli masz 18 lat i zgadzasz się na uział, możesz kontynuować</p>
        <p>Naciśnij spację by kontynuować.</p>
      `
    };
    timeline.push(consent_screen);

    const fixation = {
      type: jsPsychHtmlKeyboardResponse,
      stimulus: `
        <div class="small-info">List ${selected_list_number}</div>
        <div class="stimulus">+</div>
      `,
      choices: "NO_KEYS",
      trial_duration: 500
    };

    const prime_trial = {
      type: jsPsychHtmlKeyboardResponse,
      stimulus: function() {
        const prime = jsPsych.timelineVariable('prime');
        if (prime && typeof prime === 'string') {
          return `<div class="small-info">List ${selected_list_number}</div><div class="stimulus">${prime}</div>`;
        }
        return prime;
      },
      choices: "NO_KEYS",
      trial_duration: 2000,
      data: function() {
        return {
          item_id: jsPsych.timelineVariable('id'),
          prime: jsPsych.timelineVariable('prime'),
          target: jsPsych.timelineVariable('target'),
          condition: jsPsych.timelineVariable('condition'),
          list: jsPsych.timelineVariable('list'),
          phase: 'prime'
        };
      }
    };

    const blank = {
      type: jsPsychHtmlKeyboardResponse,
      stimulus: '',
      choices: "NO_KEYS",
      trial_duration: 100
    };

    const practice_intro = {
      type: jsPsychHtmlKeyboardResponse,
      stimulus: `
        <div class="small-info">Practice</div>
        <p>Zaczniemy od dwóch rund próbnych.</p>
        <p>Zobaczysz ciąg liter, później kolejny. Zdecyduj, czy dany ciąg liter jest słówkiem lub nie.</p>
        <p>Naciśnij P dla prawdziwych słów i Q dla nieprawdziwych.</p>
        <p>Naciśnij spację by kontynuować.</p>
      `
    };

    const practice_prime_trial = {
      type: jsPsychHtmlKeyboardResponse,
      stimulus: `
        <div class="small-info">Practice</div>
        <div class="stimulus">wziąć</div>
      `,
      choices: "NO_KEYS",
      trial_duration: 2000,
      data: {
        phase: 'practice_prime',
        practice: true,
        prime: 'wziąć',
        target: 'kurtka'
      }
    };

    const practice_target_trial = {
      type: jsPsychHtmlKeyboardResponse,
      stimulus: `
        <div class="small-info">Practice</div>
        <div class="stimulus">kurtka</div>
        <p>W = real word, O = nonword</p>
      `,
      choices: ['p', 'q'],
      data: {
        phase: 'practice_target',
        practice: true,
        prime: 'wziąć',
        target: 'kurtka',
        item_type: 'real',
        correct_response: 'p'
      },
      on_finish: function(data) {
        data.correct = jsPsych.pluginAPI.compareKeys(data.response, data.correct_response);
        data.result = data.correct ? 'Dobrze' : 'Źle';
      }
    };

    const practice_feedback = {
      type: jsPsychHtmlKeyboardResponse,
      stimulus: function() {
        const last_trial = jsPsych.data.get().last(1).values()[0];
        return `
          <div class="small-info">Practice</div>
          <p>${last_trial.correct ? 'Świetnie!' : 'Niepoprawnie'}</p>
          <p>Naciśnij spację by kontynuować.</p>
        `;
      }
    };

    const practice_prime_trial_nonword = {
      type: jsPsychHtmlKeyboardResponse,
      stimulus: `
        <div class="small-info">Practice</div>
        <div class="stimulus">pojechać</div>
      `,
      choices: "NO_KEYS",
      trial_duration: 2000,
      data: {
        phase: 'practice_prime',
        practice: true,
        prime: 'pojechać',
        target: 'blubladi'
      }
    };

    const practice_target_trial_nonword = {
      type: jsPsychHtmlKeyboardResponse,
      stimulus: `
        <div class="small-info">Practice</div>
        <div class="stimulus">blubladi</div>
        <p>W = real word, O = nonword</p>
      `,
      choices: ['p', 'q'],
      data: {
        phase: 'practice_target',
        practice: true,
        prime: 'pojechać',
        target: 'blubladi',
        item_type: 'nonword',
        correct_response: 'q'
      },
      on_finish: function(data) {
        data.correct = jsPsych.pluginAPI.compareKeys(data.response, data.correct_response);
        data.result = data.correct ? 'Dobrze' : 'Źle';
      }
    };

        const practice_prime_trial_real2 = {
      type: jsPsychHtmlKeyboardResponse,
      stimulus: `
        <div class="small-info">Practice</div>
        <div class="stimulus">Blue</div>
      `,
      choices: "NO_KEYS",
      trial_duration: 2000,
      data: {
        phase: 'practice_prime',
        practice: true,
        prime: 'Blue',
        target: 'House'
      }
    };

    const practice_target_trial_real2 = {
      type: jsPsychHtmlKeyboardResponse,
      stimulus: `
        <div class="small-info">Practice</div>
        <div class="stimulus">House</div>
        <p>W = real word, O = nonword</p>
      `,
      choices: ['w', 'o'],
      data: {
        phase: 'practice_target',
        practice: true,
        prime: 'Blue',
        target: 'House',
        item_type: 'real',
        correct_response: 'w'
      },
      on_finish: function(data) {
        data.correct = jsPsych.pluginAPI.compareKeys(data.response, data.correct_response);
        data.result = data.correct ? 'right' : 'wrong';
      }
    };

    const practice_prime_trial_nonword2 = {
      type: jsPsychHtmlKeyboardResponse,
      stimulus: `
        <div class="small-info">Practice</div>
        <div class="stimulus">Yellow</div>
      `,
      choices: "NO_KEYS",
      trial_duration: 2000,
      data: {
        phase: 'practice_prime',
        practice: true,
        prime: 'Yellow',
        target: 'trudaki'
      }
    };

    const practice_target_trial_nonword2 = {
      type: jsPsychHtmlKeyboardResponse,
      stimulus: `
        <div class="small-info">Practice</div>
        <div class="stimulus">trudaki</div>
        <p>W = real word, O = nonword</p>
      `,
      choices: ['w', 'o'],
      data: {
        phase: 'practice_target',
        practice: true,
        prime: 'Yellow',
        target: 'trudaki',
        item_type: 'nonword',
        correct_response: 'o'
      },
      on_finish: function(data) {
        data.correct = jsPsych.pluginAPI.compareKeys(data.response, data.correct_response);
        data.result = data.correct ? 'right' : 'wrong';
      }
    };
    
    const practice_procedure = {
      timeline: [
        practice_intro,
        fixation,
        practice_prime_trial,
        blank,
        practice_target_trial,
        practice_feedback,
        fixation,
        practice_prime_trial_nonword,
        blank,
        practice_target_trial_nonword,
        practice_feedback
      ]
    };

    const previous_experience = {
      type: jsPsychHtmlKeyboardResponse,
      stimulus: `
        <div class="small-info">List ${selected_list_number}</div>
        <p><strong>Jendak zanim zaczniemy</strong></p>
        <p>Czy już wykonałeś to badanie?</p>
        <p>Naciśnij <strong>1</strong> jeśli wykonujesz go po raz pierwszy</p>
        <p>Naciśnij <strong>2</strong> jeśli jest to twój drugi lub kolejny raz</p>
      `,
      choices: ['1', '2'],
      data: {
        phase: 'previous_experience'
      },
      on_finish: function(data) {
        data.first_time = data.response === '1' ? true : false;
      }
    };

    const handedness_question = {
      type: jsPsychHtmlKeyboardResponse,
      stimulus: `
        <div class="small-info">List ${selected_list_number}</div>
        <p><strong>Handedness</strong></p>
        <p><strong>One more thing before we continue</strong></p>
        <p>Are you left-handed or right-handed?</p>
        <p>Press <strong>Q</strong> for left-handed</p>
        <p>Press <strong>P</strong> for right-handed</p>
      `,
      choices: ['q', 'p'],
      data: {
        phase: 'handedness'
      },
      on_finish: function(data) {
        data.handedness = data.response === 'q' ? 'left' : 'right';
      }
    };

    timeline.push(previous_experience);
    timeline.push(handedness_question);
    timeline.push(practice_procedure);

    const target_trial = {
      type: jsPsychHtmlKeyboardResponse,
      stimulus: function() {
        const target = jsPsych.timelineVariable('target');
        if (target && typeof target === 'string') {
          return `<div class="small-info">List ${selected_list_number}</div><div class="stimulus">${target}</div><p>W = real word, O = nonword</p>`;
        }
        return target;
      },
      choices: ['w', 'o'],
      trial_duration: 3000,
      data: function() {
        return {
          item_id: jsPsych.timelineVariable('id'),
          prime: jsPsych.timelineVariable('prime'),
          target: jsPsych.timelineVariable('target'),
          condition: jsPsych.timelineVariable('condition'),
          list: jsPsych.timelineVariable('list'),
          item_type: jsPsych.timelineVariable('item_type'),
          phase: 'target',
          correct_response: jsPsych.timelineVariable('item_type') === 'nonword' ? 'o' : 'w'
        };
      },
      on_finish: function(data) {
        const timed_out = data.response === null;
        data.timed_out = timed_out;
        data.correct = !timed_out && jsPsych.pluginAPI.compareKeys(data.response, data.correct_response);
        data.result = data.correct ? 'right' : 'wrong';
      }
    };

    const trial_procedure = {
      timeline: [fixation, prime_trial, blank, target_trial],
      timeline_variables: randomized_trials
    };

    timeline.push(trial_procedure);

    const end_screen = {
      type: jsPsychHtmlKeyboardResponse,
      stimulus: `
        <p>You have completed the experiment!</p>
        <p>Thank you very much for participating!</p>
        <p>This experiment is part of a study on language processing.</p>
        <p>That we have to do for a course.</p>
        <p>But, if all goes well, we would like to share the general conclusions when we are done!</p>
        <p>Press any key to finish!</p>
      `
    };
    timeline.push(end_screen);

    const pavlovia_finish = {
      type: jsPsychPavlovia,
      command: "finish"
    };
    timeline.push(pavlovia_finish);

    jsPsych.run(timeline);
  </script>
  </body>
</html>
